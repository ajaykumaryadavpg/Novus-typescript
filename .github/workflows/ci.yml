name: Novus CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  test-api:
    name: API Tests
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test tests/example/basic-api
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-report
          path: tests/resources/reports/
          retention-days: 14

  test-ui:
    name: UI Tests
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test tests/example/tpg-contact-us
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-report
          path: |
            tests/resources/reports/
            tests/resources/screenshots/
          retention-days: 14
